# Render Blueprint — Calculadora OTE Beef Passion
# Persistência (Opção A): o disco do Render é efêmero, então o app grava o
# config.json de volta no GitHub a cada mudança estrutural (preços, tabelas,
# intragrupo, OTE, vendedores, código). O histórico do git vira o backup.
# No próximo deploy o app carrega o config.json já atualizado do repositório.
#
# Setup único (uma vez): no painel do Render, em Environment, cole o token em
# GITHUB_TOKEN. Use um Fine-grained PAT com permissão "Contents: Read and write"
# apenas neste repositório, sem expiração (set-and-forget). Nunca commite o token.
services:
  - type: web
    name: calculadora-ote-beef-passion
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: GITHUB_TOKEN
        sync: false            # secret: cole no painel do Render, não no repo
      - key: GITHUB_REPO
        value: LuisStoic/Calculadora_OTE_Beef-Passion
      - key: GITHUB_BRANCH
        value: main
